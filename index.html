<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Unicorn Calc" />
  <title>Unicorn Calculator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, #fce4f8, #e8eaff, #e0f8f0);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }

    @keyframes float {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-6px); }
    }

    @keyframes sparkle {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.3; transform: scale(0.6); }
    }

    .calc {
      width: 300px;
      border-radius: 24px;
      padding: 20px;
      background: linear-gradient(135deg, #fff0f8, #f0f4ff, #f0fff8);
      border: 2px solid #e0c8f0;
      box-shadow: 0 8px 32px rgba(180, 100, 220, 0.2);
    }

    .unicorn-head {
      text-align: center;
      font-size: 52px;
      animation: float 3s ease-in-out infinite;
      margin-bottom: 4px;
      line-height: 1;
    }

    .sparkles {
      display: flex;
      justify-content: center;
      gap: 8px;
      margin-bottom: 12px;
      font-size: 14px;
    }

    .sparkles span:nth-child(1) { animation: sparkle 1.2s infinite 0.0s; }
    .sparkles span:nth-child(2) { animation: sparkle 1.2s infinite 0.3s; }
    .sparkles span:nth-child(3) { animation: sparkle 1.2s infinite 0.6s; }
    .sparkles span:nth-child(4) { animation: sparkle 1.2s infinite 0.9s; }
    .sparkles span:nth-child(5) { animation: sparkle 1.2s infinite 1.2s; }

    .display {
      background: linear-gradient(135deg, #2d1b4e, #1a1035);
      border-radius: 14px;
      padding: 14px 16px;
      margin-bottom: 14px;
      min-height: 72px;
      text-align: right;
    }

    .expr {
      font-size: 13px;
      color: #b088e0;
      min-height: 18px;
      font-family: monospace;
      margin-bottom: 4px;
    }

    .result {
      font-size: 28px;
      font-weight: 500;
      color: #f0e0ff;
      font-family: monospace;
      word-break: break-all;
    }

    .rainbow-bar {
      height: 5px;
      border-radius: 4px;
      background: linear-gradient(90deg, #ff6b6b, #ffa94d, #ffe066, #69db7c, #4ec9f0, #748ffc, #da77f2);
      margin-bottom: 14px;
    }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
    }

    .btn {
      border: none;
      border-radius: 12px;
      font-size: 18px;
      font-weight: 500;
      padding: 16px 4px;
      cursor: pointer;
      transition: transform 0.1s, filter 0.1s;
      font-family: inherit;
      -webkit-tap-highlight-color: transparent;
    }

    .btn:active { transform: scale(0.93); filter: brightness(1.15); }

    .btn-num  { background: #fff; color: #3a1f5e; border: 1.5px solid #e0c8f0; }
    .btn-r    { background: linear-gradient(135deg, #ff8fab, #ff6b9d); color: #fff; }
    .btn-o    { background: linear-gradient(135deg, #ffa94d, #ff8c42); color: #fff; }
    .btn-y    { background: linear-gradient(135deg, #ffe066, #ffd43b); color: #5a4000; }
    .btn-g    { background: linear-gradient(135deg, #69db7c, #40c057); color: #fff; }
    .btn-b    { background: linear-gradient(135deg, #4ec9f0, #22b8cf); color: #fff; }
    .btn-i    { background: linear-gradient(135deg, #748ffc, #4c6ef5); color: #fff; }
    .btn-v    { background: linear-gradient(135deg, #da77f2, #be4bdb); color: #fff; }
    .btn-clear { background: linear-gradient(135deg, #ff6b6b, #fa5252); color: #fff; font-size: 15px; }
    .btn-eq   { background: linear-gradient(135deg, #da77f2, #7048e8); color: #fff; font-size: 22px; }
    .btn-zero { grid-column: span 2; }

    .magic-msg {
      text-align: center;
      font-size: 13px;
      color: #b088e0;
      margin-top: 12px;
      min-height: 18px;
    }
  </style>
</head>
<body>
  <div class="calc">
    <div class="unicorn-head">🦄</div>
    <div class="sparkles">
      <span>✦</span><span>✧</span><span>✦</span><span>✧</span><span>✦</span>
    </div>
    <div class="display">
      <div class="expr" id="expr"></div>
      <div class="result" id="result">0</div>
    </div>
    <div class="rainbow-bar"></div>
    <div class="btn-grid">
      <button class="btn btn-clear" onclick="clearAll()">AC</button>
      <button class="btn btn-o" onclick="inputChar('(')">(</button>
      <button class="btn btn-o" onclick="inputChar(')')">)</button>
      <button class="btn btn-v" onclick="inputOp('/')">÷</button>

      <button class="btn btn-num" onclick="inputChar('7')">7</button>
      <button class="btn btn-num" onclick="inputChar('8')">8</button>
      <button class="btn btn-num" onclick="inputChar('9')">9</button>
      <button class="btn btn-i" onclick="inputOp('*')">×</button>

      <button class="btn btn-num" onclick="inputChar('4')">4</button>
      <button class="btn btn-num" onclick="inputChar('5')">5</button>
      <button class="btn btn-num" onclick="inputChar('6')">6</button>
      <button class="btn btn-b" onclick="inputOp('-')">−</button>

      <button class="btn btn-num" onclick="inputChar('1')">1</button>
      <button class="btn btn-num" onclick="inputChar('2')">2</button>
      <button class="btn btn-num" onclick="inputChar('3')">3</button>
      <button class="btn btn-g" onclick="inputOp('+')">+</button>

      <button class="btn btn-num btn-zero" onclick="inputChar('0')">0</button>
      <button class="btn btn-num" onclick="inputDot()">.</button>
      <button class="btn btn-eq" onclick="calculate()">=</button>
    </div>
    <div class="magic-msg" id="magic"></div>
  </div>

  <script>
    let expr = '';
    let justCalc = false;
    const magicMsgs = ['✨ magical!', '🌈 rainbow math!', '🦄 so sparkly!', '💫 enchanting!', '🌸 beautiful!', '⭐ starry!'];

    function updateDisplay() {
      document.getElementById('expr').textContent = expr || '';
    }

    function inputChar(c) {
      if (justCalc && !isNaN(c)) { expr = ''; }
      justCalc = false;
      expr += c;
      document.getElementById('result').textContent = expr;
      updateDisplay();
    }

    function inputOp(op) {
      justCalc = false;
      if (expr === '' && op === '-') { expr = '-'; }
      else if (expr !== '') {
        const last = expr.slice(-1);
        if ('+-*/'.includes(last)) { expr = expr.slice(0, -1); }
        expr += op;
      }
      document.getElementById('result').textContent = expr;
      updateDisplay();
    }

    function inputDot() {
      justCalc = false;
      const parts = expr.split(/[\+\-\*\/]/);
      const last = parts[parts.length - 1];
      if (!last.includes('.')) { expr += (last === '' ? '0' : '') + '.'; }
      document.getElementById('result').textContent = expr;
      updateDisplay();
    }

    function clearAll() {
      expr = '';
      justCalc = false;
      document.getElementById('result').textContent = '0';
      document.getElementById('expr').textContent = '';
      document.getElementById('magic').textContent = '';
    }

    function calculate() {
      if (!expr) return;
      try {
        document.getElementById('expr').textContent = expr + ' =';
        let res = Function('"use strict"; return (' + expr + ')')();
        if (!isFinite(res)) { document.getElementById('result').textContent = 'oops!'; return; }
        const disp = parseFloat(res.toFixed(10)).toString();
        document.getElementById('result').textContent = disp;
        expr = disp;
        justCalc = true;
        document.getElementById('magic').textContent = magicMsgs[Math.floor(Math.random() * magicMsgs.length)];
        setTimeout(() => { document.getElementById('magic').textContent = ''; }, 2000);
      } catch (e) {
        document.getElementById('result').textContent = 'oops!';
        expr = '';
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key >= '0' && e.key <= '9') inputChar(e.key);
      else if (e.key === '+') inputOp('+');
      else if (e.key === '-') inputOp('-');
      else if (e.key === '*') inputOp('*');
      else if (e.key === '/') { e.preventDefault(); inputOp('/'); }
      else if (e.key === '.') inputDot();
      else if (e.key === 'Enter' || e.key === '=') calculate();
      else if (e.key === 'Escape') clearAll();
      else if (e.key === 'Backspace') {
        expr = expr.slice(0, -1);
        document.getElementById('result').textContent = expr || '0';
        updateDisplay();
      }
    });
  </script>
</body>
</html>
